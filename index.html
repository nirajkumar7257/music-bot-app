<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot Collective</title>
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org"></script>
    <style>
        /* CSS RESET & THEME */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* HEADER */
        .app-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-header h1 {
            font-size: 22px;
            color: #3b82f6;
            font-weight: bold;
        }
        .app-header p {
            font-size: 12px;
            color: #9ca3af;
        }
        .user-pill {
            font-size: 12px;
            background-color: #1f2937;
            padding: 4px 12px;
            border-radius: 20px;
            color: #e5e7eb;
        }

        /* CHUPANE WALI CLASS */
        .hidden {
            display: none !important;
        }

        /* BOT CARD LIST */
        .bot-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .bot-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .bot-main-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .bot-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .bot-text-details {
            flex: 1;
        }
        .bot-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bot-title-name {
            font-size: 16px;
            font-weight: 700;
            color: #f3f4f6;
        }
        .bot-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .badge-active {
            background-color: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }
        .badge-maintenance {
            background-color: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }
        .bot-user-handle {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 2px;
        }
        .bot-numeric-id {
            font-size: 11px;
            color: #4b5563;
            margin-top: 2px;
        }
        .bot-actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .action-button {
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-blue {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-gray {
            background-color: #1f2937;
            color: #ffffff;
            border: 1px solid #374151;
        }

        /* SCREENS STYLING */
        .profile-layout {
            text-align: center;
            padding: 24px 0;
        }
        .large-dp-circle {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            margin: 0 auto 16px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }
        .bg-blue-gradient {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
        }
        .bg-amber-gradient {
            background: linear-gradient(135deg, #d97706, #ea580c);
        }
        .main-heading {
            font-size: 24px;
            font-weight: bold;
            color: #f3f4f6;
        }
        .sub-heading {
            font-size: 14px;
            color: #3b82f6;
            margin-top: 4px;
        }

        /* SYSTEM DATA BOX */
        .data-table-box {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 16px;
            margin: 20px auto 0 auto;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }
        .data-table-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.4);
        }
        .data-table-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .row-label {
            color: #9ca3af;
        }
        .row-value {
            color: #e5e7eb;
            font-weight: 500;
        }
        .monospace {
            font-family: monospace;
        }
        .owner-submit-btn {
            background: linear-gradient(90deg, #ea580c, #d97706);
            color: #ffffff;
            font-weight: bold;
            padding: 12px 36px;
            border-radius: 12px;
            border: none;
            margin-top: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        /* FIXED FOOTER NAVIGATION */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #030712;
            border-top: 1px solid #1f2937;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 9999;
        }
        .nav-item-btn {
            background: none;
            border: none;
            color: #4b5563;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            width: 33.33%;
        }
        .nav-item-btn svg {
            width: 22px;
            height: 22px;
        }
        .nav-item-btn span {
            font-size: 11px;
            font-weight: 500;
        }
        .nav-item-btn.active-tab-highlight {
            color: #3b82f6;
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: HOME (BOT LIST) -->
    <div id="screen-home" class="page-container">
        <div class="app-header">
            <div>
                <h1>Music Bot Collective</h1>
                <p>All active bots & activities list</p>
            </div>
            <span id="user-top-name" class="user-pill">Hi, User</span>
        </div>
        <div id="bot-list-target" class="bot-container">
            <!-- Data load via script -->
        </div>
    </div>

    <!-- SCREEN 2: USER PROFILE -->
    <div id="screen-profile" class="page-container hidden profile-layout">
        <div id="user-avatar-initial" class="large-dp-circle bg-blue-gradient">U</div>
        <h2 id="user-display-name" class="main-heading">Telegram User</h2>
        <p id="user-handle-name" class="sub-heading">@Username</p>

        <div class="data-table-box">
            <div class="data-table-row">
                <span class="row-label">User ID</span>
                <span id="field-user-id" class="row-value monospace">00000000</span>
            </div>
            <div class="data-table-row">
                <span class="row-label">Chat ID</span>
                <span id="field-chat-id" class="row-value monospace">00000000</span>
            </div>
            <div class="data-table-row">
                <span class="row-label">Premium User</span>
                <span id="field-premium" class="row-value">No</span>
            </div>
            <div class="data-table-row">
                <span class="row-label">Language</span>
                <span id="field-lang" class="row-value">EN</span>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: OWNER DETAILS -->
    <div id="screen-owner" class="page-container hidden profile-layout">
        <div class="large-dp-circle bg-amber-gradient">👑</div>
        <h2 class="main-heading">Niraj Kumar</h2>
        <p class="sub-heading" style="color: #fbbf24;">@Comeback_009</p>

        <div class="data-table-box">
            <div class="data-table-row">
                <span class="row-label">Owner User ID</span>
                <span class="row-value monospace" style="color: #fbbf24;">7771481658</span>
            </div>
            <div class="data-table-row">
                <span class="row-label">Owner Chat ID</span>
                <span class="row-value monospace" style="color: #fbbf24;">7771481658</span>
            </div>
            <div class="data-table-row">
                <span class="row-label">Network Status</span>
                <span class="row-value" style="color: #4ade80;">Main Owner</span>
            </div>
        </div>
        <button onclick="window.open('https://t.me', '_blank')" class="owner-submit-btn">
            Contact Owner
        </button>
    </div>

    <!-- BOTTOM FIXED NAV SYSTEM -->
    <div class="bottom-nav-bar">
