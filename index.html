<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bot Store with Owner Details</title>
    <!-- टेलीग्राम का आवश्यक SDK स्क्रिप्ट -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b141a; /* डार्क थीम बैकग्राउंड */
            color: #ffffff;
            text-align: center;
            padding: 20px 15px;
            margin: 0;
        }
        /* ओनर कार्ड की स्टाइलिंग */
        .owner-card {
            background: #1c2d38;
            border-radius: 14px;
            padding: 15px;
            margin: 10px auto 25px auto;
            max-width: 340px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #ffb703; /* ओनर के लिए गोल्डन बॉर्डर */
            box-sizing: border-box;
        }
        .owner-header {
            display: flex;
            align-items: center;
        }
        .owner-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid #ffb703;
            background: #24303f;
        }
        .owner-info h4 {
            margin: 0;
            font-size: 16px;
            color: #ffb703; /* गोल्डन नाम */
        }
        .owner-username {
            margin: 3px 0;
            font-size: 13px;
            color: #b1c3cc;
        }
        .owner-id {
            margin: 0;
            font-size: 11px;
            color: #8fa0a8;
        }
        .owner-badge {
            background: rgba(255, 183, 3, 0.1);
            color: #ffb703;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        .section-title {
            text-align: left;
            max-width: 340px;
            margin: 20px auto 10px auto;
            color: #14ffd6;
            font-size: 16px;
            font-weight: bold;
        }
        /* म्यूजिक बॉट कार्ड की स्टाइलिंग */
        .bot-card {
            background: #15242d;
            border-radius: 14px;
            padding: 15px;
            margin: 12px auto;
            max-width: 340px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .bot-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .bot-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            background: #24303f;
            border: 1px solid #14ffd6;
        }
        .bot-info h4 { margin: 0; font-size: 16px; color: #ffffff; }
        .bot-username { margin: 2px 0 0 0; font-size: 13px; color: #8fa0a8; }
        .bot-desc { font-size: 13px; color: #b1c3cc; margin: 0 0 15px 0; line-height: 1.4; }
        .open-btn {
            background-color: #00a884;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .open-btn:active { background-color: #008f70; }
    </style>
</head>
<body>

    <!-- 👑 ओनर डिटेल्स कार्ड 👑 -->
    <div class="owner-card">
        <div class="owner-badge">👑 APP OWNER</div>
        <div class="owner-header">
            <!-- ⚠️ नीचे MissQtBot की जगह अपना असली टेलीग्राम यूजरनेम डाल लें ताकि आपकी DP लोड हो सके -->
            <img class="owner-avatar" src="https://img.t.me/i/userpic/320/Comeback_009.jpg" alt="Owner DP" onerror="this.src='https://ui-avatars.com'">
            
            <div class="owner-info">
                <!-- यहाँ अपना नाम और डिटेल्स लिख लें -->
                <h4>Niraj Kumar</h4>
                <p class="owner-username">@Comeback_009</p>
                <p class="owner-id">ID: 7771481658</p>
            </div>
        </div>
    </div>

    <div class="section-title">🎵 Music Bot Collective</div>

    <!-- बॉट 1 -->
    <div class="bot-card">
        <div class="bot-header">
            <img class="bot-avatar" src="https://t.me/laado_musicbot.jpg" alt="DP" onerror="this.src='https://ui-avatars.com'">
            <div class="bot-info">
                <h4>˹ʟᴀᴀᴅᴏ ꭙ ᴍᴜsɪᴄ˼ ♪</h4>
                <p class="bot-username">@laado_musicbot</p>
            </div>
        </div>
        <p class="bot-desc">High quality music player in voice chats - Play any song!</p>
        <button class="open-btn" onclick="openBot('@laado_musicbot')">➡️ Open Bot</button>
    </div>

    <!-- बॉट 2 -->
    <div class="bot-card">
        <div class="bot-header">
            <img class="bot-avatar" src="https://t.me/laado_musicbot.jpg" alt="DP" onerror="this.src='https://ui-avatars.com'">
            <div class="bot-info">
                <h4>˹ʟᴀᴀᴅᴏ ꭙ ᴍᴜsɪᴄ˼ ♪</h4>
                <p class="bot-username">@laado_musicbot</p>
            </div>
        </div>
        <p class="bot-desc">Fast and powerful music streaming bot for Telegram groups.</p>
        <button class="open-btn" onclick="openBot('@laado_musicbot')">➡️ Open Bot</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openBot(username) {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            tg.openTelegramLink("https://t.me" + username);
        }
    </script>
</body>
</html>
